<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - PuranGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        body { background-color: var(--bg-base); color: var(--t1); margin: 0; padding: 40px 20px; font-family: 'Inter', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: rgba(20, 17, 13, 0.85); border: 1px solid var(--border-light); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-box { background: var(--b0); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border-light); }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--saffron); margin-bottom: 4px; }
        .stat-label { font-size: 14px; color: var(--t2); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
        th { color: var(--t2); font-weight: 500; font-size: 14px; text-transform: uppercase; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .role-free { background: #333; color: #fff; }
        .role-pro { background: var(--saffron); color: #000; }
        .role-admin { background: #ff4b4b; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-family: 'Outfit', sans-serif; margin-bottom: 30px;">Admin Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div id="stat-total-users" class="stat-value">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-box">
                <div id="stat-paid-users" class="stat-value">-</div>
                <div class="stat-label">Paid Users</div>
            </div>
            <div class="stat-box">
                <div id="stat-messages-today" class="stat-value">-</div>
                <div class="stat-label">Messages Today</div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="margin-top: 0;">Recent Users</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Daily Msgs</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr><td colspan="4" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        onAuthStateChange(async (user, profile) => {
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            if (!isAdmin()) {
                alert("Unauthorized");
                window.location.href = '/';
                return;
            }
            loadAdminData();
        });
        
        async function loadAdminData() {
            const headers = await getAuthHeaders();
            
            // Load stats
            try {
                const res = await fetch('/api/admin/stats', { headers });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-total-users').innerText = data.total_users || 0;
                    document.getElementById('stat-paid-users').innerText = data.paid_users || 0;
                    document.getElementById('stat-messages-today').innerText = data.messages_today || 0;
                }
            } catch (e) { console.error(e); }
            
            // Load users
            try {
                const res = await fetch('/api/admin/users', { headers });
                if (res.ok) {
                    const data = await res.json();
                    const tbody = document.getElementById('users-table');
                    tbody.innerHTML = '';
                    
                    data.users.forEach(u => {
                        const tr = document.createElement('tr');
                        const date = new Date(u.created_at).toLocaleDateString();
                        let badgeClass = 'role-free';
                        if (u.role === 'pro' || u.role === 'scholar') badgeClass = 'role-pro';
                        if (u.role === 'admin') badgeClass = 'role-admin';
                        
                        tr.innerHTML = `
                            <td>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <img src="${u.avatar_url || 'https://via.placeholder.com/32'}" style="width: 32px; height: 32px; border-radius: 50%;">
                                    ${u.display_name || 'User'}
                                </div>
                            </td>
                            <td><span class="role-badge ${badgeClass}">${u.role}</span></td>
                            <td>${u.daily_message_count}</td>
                            <td>${date}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
