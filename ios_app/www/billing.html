<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billing - PuranGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="auth.js"></script>
    <style>
        body { background-color: var(--bg-base); color: var(--t1); margin: 0; padding: 40px 20px; font-family: 'Inter', sans-serif; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: rgba(20, 17, 13, 0.85); border: 1px solid var(--border-light); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 600; margin: 0 0 20px 0; display: flex; align-items: center; gap: 12px; color: var(--t1); }
        .nav-back { margin-bottom: 30px; display: inline-flex; align-items: center; gap: 8px; color: var(--t2); text-decoration: none; }
        .nav-back:hover { color: var(--t1); }
        .empty-state { text-align: center; padding: 40px; color: var(--t3); }
        .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--saffron); background: transparent; color: var(--saffron); cursor: pointer; text-decoration: none; display: inline-block; margin-top: 16px;}
        .btn:hover { background: rgba(212, 168, 67, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/profile.html" class="nav-back"><i data-lucide="arrow-left"></i> Back to Profile</a>
        <h1 style="font-family: 'Outfit', sans-serif; margin-bottom: 30px;">Billing & Subscription</h1>
        
        <div class="card">
            <h2 class="card-title"><i data-lucide="credit-card"></i> Current Plan</h2>
            <div id="plan-info">
                <p>You are currently on the <strong id="current-plan-name" style="text-transform: capitalize; color: var(--saffron);">Free</strong> plan.</p>
                <a href="/pricing.html" class="btn">Upgrade Plan</a>
            </div>
        </div>
        
        <div class="card">
            <h2 class="card-title"><i data-lucide="file-text"></i> Invoice History</h2>
            <div class="empty-state">
                <i data-lucide="inbox" style="width: 48px; height: 48px; opacity: 0.5; margin-bottom: 16px;"></i>
                <p>No invoices found. Payments will be implemented in Phase 3.</p>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        onAuthStateChange((user, profile) => {
            if (!user) window.location.href = '/login.html';
            else if (profile) document.getElementById('current-plan-name').innerText = profile.role;
        });
    </script>
</body>
</html>
