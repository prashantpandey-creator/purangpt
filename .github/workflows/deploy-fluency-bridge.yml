name: Deploy Fluency Bridge

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy Fluency Bridge to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            echo "=== Fluency Bridge Deploy ==="

            if [ -d /root/fluency-bridge ]; then
              cd /root/fluency-bridge
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              cd /root
              git clone https://github.com/prashantpandey-creator/fluency-bridge.git
              cd fluency-bridge
            fi

            docker network inspect coolify >/dev/null 2>&1 || docker network create coolify
            docker compose build --no-cache
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d
            docker image prune -f

            echo ""
            echo "=== Deploy complete ==="
            echo "Public: http://204.168.176.229:8088"
            echo "Admin:  http://204.168.176.229:8088/admin"
            sleep 2
            docker compose ps
            curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:8088/ || true
