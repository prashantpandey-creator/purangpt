name: Deploy Fluency Bridge

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            cd /root/fluency-bridge
            git fetch origin main
            git reset --hard origin/main
            docker compose down -v 2>/dev/null || true

            # Build just the backend
            docker compose build --no-cache backend
            docker compose up -d backend
            sleep 5

            echo "=== STATUS ==="
            docker ps -a --filter name=fluency_bridge_backend --format '{{.Status}} {{.Image}}'

            echo "=== LOGS ==="
            docker logs fluency_bridge_backend 2>&1 || true

            echo "=== CRASH FILES ==="
            docker cp fluency_bridge_backend:/tmp/stdout.log /tmp/stdout.log 2>/dev/null && cat /tmp/stdout.log || echo "NO STDOUT FILE"
            docker cp fluency_bridge_backend:/tmp/stderr.log /tmp/stderr.log 2>/dev/null && cat /tmp/stderr.log || echo "NO STDERR FILE"

            echo "=== DOCKER INSPECT ==="
            docker inspect fluency_bridge_backend --format 'ExitCode: {{.State.ExitCode}} Error: {{.State.Error}} OOM: {{.State.OOMKilled}}'
