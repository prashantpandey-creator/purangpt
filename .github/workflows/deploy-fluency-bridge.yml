name: Deploy Fluency Bridge

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            cd /root/fluency-bridge
            git fetch origin main
            git reset --hard origin/main
            docker compose down -v 2>/dev/null || true
            docker network inspect coolify >/dev/null 2>&1 || docker network create coolify
            docker compose build --no-cache
            docker compose up -d
            sleep 3
            echo "=== STATUS ==="
            docker compose ps
            echo "=== BACKEND LOGS ==="
            docker logs fluency_bridge_backend 2>&1 || true
            echo "=== TESTS ==="
            curl -s http://localhost:8088/api/health || echo "HEALTH FAIL"
            curl -s http://localhost:8088/api/waitlist || echo "API FAIL"
            echo ""
            echo "PUBLIC: http://204.168.176.229:8088"
