name: Deploy Fluency Bridge

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy Fluency Bridge to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            cd /root/fluency-bridge
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            docker network inspect coolify >/dev/null 2>&1 || docker network create coolify
            docker compose build --no-cache
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d
            docker image prune -f

            echo "=== Container status ==="
            docker compose ps
            echo ""
            echo "=== Backend logs ==="
            docker logs fluency_bridge_backend --tail 20
            echo ""
            echo "=== Test backend directly ==="
            sleep 2
            docker exec fluency_bridge_frontend wget -q -O - http://backend:8080/api/waitlist || echo "FAILED to reach backend"
            echo ""
            echo "=== Done ==="
            echo "Public: http://204.168.176.229:8088"
