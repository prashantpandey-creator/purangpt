name: Deploy Fluency Bridge

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy Fluency Bridge to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -ex
            echo "=== STEP 1: Clone/update repo ==="
            if [ -d /root/fluency-bridge ]; then
              cd /root/fluency-bridge
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
            else
              cd /root
              git clone https://github.com/prashantpandey-creator/fluency-bridge.git
              cd fluency-bridge
            fi

            echo "=== STEP 2: Check Docker ==="
            docker --version
            docker compose version

            echo "=== STEP 3: Network ==="
            docker network inspect coolify >/dev/null 2>&1 || docker network create coolify

            echo "=== STEP 4: Build ==="
            docker compose build --no-cache 2>&1

            echo "=== STEP 5: Deploy ==="
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d 2>&1

            echo "=== STEP 6: Verify ==="
            sleep 3
            docker compose ps
            curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/ || echo " (may need a moment)"
            echo ""

            echo "=== DONE ==="
            echo "Public: http://204.168.176.229:8080"
            echo "Admin:  http://204.168.176.229:8080/admin"
