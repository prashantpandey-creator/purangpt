name: Deploy PuranGPT Monorepo

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Auto-merge claude/** into main
      if: startsWith(github.ref_name, 'claude/')
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Claude"
        git config user.email "noreply@anthropic.com"
        git checkout main
        if git merge --no-edit "$GITHUB_REF_NAME"; then
          git push origin main
        else
          echo "MERGE CONFLICT — manual resolution needed"
          exit 1
        fi

    - name: Deploy to Hetzner
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        VECTOR_DB_URL: ${{ secrets.VECTOR_DB_URL }}
        FERNET_KEY: ${{ secrets.FERNET_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      with:
        host: 204.168.176.229
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: DEEPSEEK_API_KEY,GEMINI_API_KEY,GROQ_API_KEY,OPENAI_API_KEY,VECTOR_DB_URL,FERNET_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,DATABASE_URL,STRIPE_SECRET_KEY,RAZORPAY_KEY_SECRET
        script: |
          set -e
          cd /root/purangpt
          git fetch origin
          git reset --hard origin/main
          echo "Deploying $(git rev-parse --short HEAD)"
          docker compose --env-file /root/stack.env down frontend backend 2>/dev/null || true
          docker compose --env-file /root/stack.env build --no-cache frontend backend
          docker compose --env-file /root/stack.env up -d frontend backend
          docker image prune -f
          echo "✓ Deploy complete — $(git rev-parse --short HEAD)"
