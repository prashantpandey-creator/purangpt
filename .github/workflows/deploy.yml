name: Deploy Backend to Hetzner VPS

# Backend deploy. Secrets come from GitHub Repository Secrets (Settings → Secrets
# and variables → Actions); the script renders /root/purangpt/.env from them.
# Required secrets: VPS_SSH_KEY, VECTOR_DB_URL, DEEPSEEK_API_KEY, GEMINI_API_KEY,
# GROQ_API_KEY, TOGETHER_API_KEY, ZHIPU_API_KEY, FERNET_KEY.
# (An encrypted backup-of-record of all values lives in secrets/prod.env.)

on:
  push:
    branches:
      - main
    paths:
      # Only redeploy when something that affects the running image changed.
      - "backend/**"
      - "engine/**"
      - "indexer/**"
      - "data_pipeline/**"
      - "requirements.txt"
      - "Dockerfile"
      - "run.py"
      - ".github/workflows/deploy.yml"
      - "secrets/prod.env"  # rotating secrets triggers a redeploy to land the new .env
  workflow_dispatch: {} # allow manual redeploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        VECTOR_DB_URL: ${{ secrets.VECTOR_DB_URL }}
        FERNET_KEY: ${{ secrets.FERNET_KEY }}
      with:
        host: 204.168.176.229
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: DEEPSEEK_API_KEY,GEMINI_API_KEY,GROQ_API_KEY,TOGETHER_API_KEY,ZHIPU_API_KEY,VECTOR_DB_URL,FERNET_KEY
        command_timeout: 30m # backend build is heavy (torch + ML model warmup)
        script: |
          set -e
          cd /root/purangpt
          # Mirror origin/main exactly — a plain pull aborts if the server tree
          # has stray local edits, silently leaving old code deployed. We also
          # force the checked-out branch to main: the server tree historically sat
          # on the dead `develop` branch, so reset-only left a confusing ref.
          git fetch origin main
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd

          # ── Render the FULL backend .env from GitHub Secrets + static config ──
          # Must include every key the app needs — a partial .env silently breaks
          # prod (e.g. omitting GEMINI/FERNET, or a wrong VECTOR_DB_URL pointing at
          # logto-db instead of pgvector → total_verses=0, fail-fast on FERNET).
          umask 077
          cat <<EOF > .env
          LLM_PROVIDER=gemini
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL=gemini-2.5-flash
          GROQ_API_KEY=$GROQ_API_KEY
          GROQ_MODEL=llama-3.3-70b-versatile
          TOGETHER_API_KEY=$TOGETHER_API_KEY
          ZHIPU_API_KEY=$ZHIPU_API_KEY
          VECTOR_DB_URL=$VECTOR_DB_URL
          FERNET_KEY=$FERNET_KEY
          EMBED_MODEL=intfloat/multilingual-e5-small
          DATA_DIR=./data
          HOST=0.0.0.0
          PORT=8000
          EOF
          chmod 600 .env
          # Guard: never deploy an .env missing the critical keys.
          for k in VECTOR_DB_URL GEMINI_API_KEY FERNET_KEY; do
            grep -q "^$k=." .env || { echo "FATAL: $k missing from rendered .env"; exit 1; }
          done
          echo "✓ Rendered /root/purangpt/.env ($(grep -cE '^[A-Z_]+=' .env) keys)"

          cd /root
          # Rebuild the backend. We do NOT use --no-cache here: the costly
          # pip-install and sentence-transformers model-download layers key only
          # off requirements.txt, so they stay cached, while the `COPY . .` source
          # layer naturally busts after the hard reset above.
          docker compose build backend
          # --force-recreate so the container reloads the freshly-rendered .env
          # (plain `up -d` / `restart` keeps the old in-memory env).
          docker compose up -d --force-recreate backend
          docker image prune -f
