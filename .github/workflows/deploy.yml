name: Deploy Backend to Hetzner VPS

# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_SSH_KEY  — private key matching ~/.ssh/purangpt_hetzner (same as purangpt-next)
#   SOPS_AGE_KEY — the age PRIVATE key (AGE-SECRET-KEY-1…) that decrypts
#                  secrets/prod.env. Matches the recipient in .sops.yaml.

on:
  push:
    branches:
      - main
    paths:
      # Only redeploy when something that affects the running image changed.
      - "backend/**"
      - "engine/**"
      - "indexer/**"
      - "data_pipeline/**"
      - "requirements.txt"
      - "Dockerfile"
      - "run.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # allow manual redeploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      with:
        host: 204.168.176.229
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: SOPS_AGE_KEY # forward the decryption key into the remote shell
        command_timeout: 30m # backend build is heavy (torch + ML model warmup)
        script: |
          set -e
          cd /root/purangpt
          # Mirror origin/main exactly — a plain pull aborts if the server tree
          # has stray local edits, silently leaving old code deployed.
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          # ── Render secrets: decrypt secrets/prod.env -> /root/purangpt/.env ──
          # Runs AFTER `git clean -fd` (which would otherwise delete the untracked
          # .env). The production compose must consume this file via the backend
          # service's `env_file: ./purangpt/.env`.
          if ! command -v sops >/dev/null 2>&1; then
            echo "Installing sops…"
            curl -fsSL -o /usr/local/bin/sops \
              https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
            chmod +x /usr/local/bin/sops
          fi
          umask 077
          SOPS_AGE_KEY="$SOPS_AGE_KEY" sops -d secrets/prod.env > .env
          if grep -q 'REPLACE_ME' .env; then
            echo "✗ .env still has REPLACE_ME placeholders — run 'sops secrets/prod.env' to fill real values. Aborting." >&2
            rm -f .env
            exit 1
          fi
          chmod 600 .env
          echo "✓ Rendered $(grep -cE '^[A-Z]' .env) secret(s) to /root/purangpt/.env"

          cd /root
          # Rebuild the backend. We do NOT use --no-cache here: the costly
          # pip-install and sentence-transformers model-download layers key only
          # off requirements.txt, so they stay cached, while the `COPY . .` source
          # layer naturally busts after the hard reset above.
          docker compose build backend
          docker compose up -d backend
          docker image prune -f
