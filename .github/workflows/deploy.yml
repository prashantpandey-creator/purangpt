name: Deploy Backend to Hetzner VPS

# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_SSH_KEY  — private key matching ~/.ssh/purangpt_hetzner (same as purangpt-next)
#   SOPS_AGE_KEY — the age PRIVATE key (AGE-SECRET-KEY-1…) that decrypts
#                  secrets/prod.env. Matches the recipient in .sops.yaml.

on:
  push:
    branches:
      - main
    paths:
      # Only redeploy when something that affects the running image changed.
      - "backend/**"
      - "engine/**"
      - "indexer/**"
      - "data_pipeline/**"
      - "requirements.txt"
      - "Dockerfile"
      - "run.py"
      - ".github/workflows/deploy.yml"
      - "secrets/prod.env"  # rotating secrets triggers a redeploy to land the new .env
  workflow_dispatch: {} # allow manual redeploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        VECTOR_DB_URL: ${{ secrets.VECTOR_DB_URL }}
      with:
        host: 204.168.176.229
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: DEEPSEEK_API_KEY,TOGETHER_API_KEY,ZHIPU_API_KEY,VECTOR_DB_URL # forward secrets into remote shell
        command_timeout: 30m # backend build is heavy (torch + ML model warmup)
        script: |
          set -e
          cd /root/purangpt
          # Mirror origin/main exactly — a plain pull aborts if the server tree
          # has stray local edits, silently leaving old code deployed. We also
          # force the checked-out branch to main: the server tree historically sat
          # on the dead `develop` branch, so reset-only left a confusing ref.
          git fetch origin main
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd

          # ── Render secrets directly to /root/purangpt/.env ──
          umask 077
          cat <<EOF > .env
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          TOGETHER_API_KEY=$TOGETHER_API_KEY
          ZHIPU_API_KEY=$ZHIPU_API_KEY
          VECTOR_DB_URL=$VECTOR_DB_URL
          EOF
          chmod 600 .env
          echo "✓ Rendered secrets to /root/purangpt/.env"

          cd /root
          # Rebuild the backend. We do NOT use --no-cache here: the costly
          # pip-install and sentence-transformers model-download layers key only
          # off requirements.txt, so they stay cached, while the `COPY . .` source
          # layer naturally busts after the hard reset above.
          docker compose build backend
          docker compose up -d backend
          docker image prune -f
