name: Deploy to Hetzner VPS

# Required repo secrets:
#   VPS_SSH_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   GROQ_API_KEY, DATABASE_URL
#   RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
#   STRIPE_PRO_MONTHLY_PRICE_ID, STRIPE_PRO_ANNUAL_PRICE_ID
#   NEXT_PUBLIC_REVENUECAT_APPLE_KEY, NEXT_PUBLIC_RAZORPAY_KEY_ID
#
# Fully hands-off pipeline. Nobody has to merge or deploy manually:
#   - A push to main           -> deploy straight away.
#   - A push to any claude/**  -> auto-merge it into main, then deploy.
# The merge is pushed with GITHUB_TOKEN, which (by GitHub design) does NOT
# re-trigger this workflow, so there is no deploy loop — the same run that does
# the merge also runs the deploy step. A genuine merge conflict fails the run
# visibly instead of silently shipping stale code.

on:
  push:
    branches:
      - main
      - 'claude/**'

# contents: write -> auto-merge step pushes the merge commit back to main.
# issues:   write -> the merge bot opens a tracking issue if it can't resolve.
permissions:
  contents: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Full history so we can merge the pushed branch into main locally.
        fetch-depth: 0

    - name: Auto-merge claude/** into main (AI-assisted)
      if: startsWith(github.ref_name, 'claude/')
      env:
        # Free-tier Gemini powers the merge bot. If unset, a conflict simply
        # opens an issue and fails the run (no silent stale deploys).
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main:main
        git checkout main

        if git merge --no-edit "${{ github.sha }}"; then
          echo "✓ Clean merge — no conflicts."
        else
          echo "::warning::Merge conflict — invoking the AI merge bot."
          CONFLICTS=$(git diff --name-only --diff-filter=U)
          echo "Conflicted files:"; echo "$CONFLICTS"

          if python3 .github/scripts/ai-merge-resolve.py $CONFLICTS; then
            git add -A
            # Hard guard: never deploy a tree that still has conflict markers.
            if git -c core.pager=cat grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- $CONFLICTS; then
              echo "::error::Conflict markers still present after AI pass — aborting."
              git merge --abort || true
              exit 1
            fi
            git commit --no-edit -m "Merge ${{ github.ref_name }} into main (AI-resolved conflicts)"
            echo "::notice::Merge bot resolved the conflict automatically."
          else
            echo "::error::Merge bot could not fully resolve the conflict."
            BODY=$(printf 'The deploy auto-merge of `%s` into `main` hit a conflict the AI merge bot could not fully resolve.\n\n**Conflicted files:**\n```\n%s\n```\n\nResolve locally:\n```\ngit checkout %s\ngit merge main   # fix conflicts\ngit push\n```\n\nWorkflow run: %s/%s/actions/runs/%s' \
              "${{ github.ref_name }}" "$CONFLICTS" "${{ github.ref_name }}" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")
            curl -sS -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues" \
              -d "$(jq -nc --arg t "🤖 Merge bot: ${{ github.ref_name }} needs manual conflict resolution" \
                          --arg b "$BODY" \
                          '{title:$t, body:$b, labels:["merge-conflict","automated"]}')" \
              > /dev/null && echo "Opened a tracking issue."
            git merge --abort || true
            exit 1
          fi
        fi

        git push origin main

    - name: SSH and Deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
        RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        STRIPE_PRO_MONTHLY_PRICE_ID: ${{ secrets.STRIPE_PRO_MONTHLY_PRICE_ID }}
        STRIPE_PRO_ANNUAL_PRICE_ID: ${{ secrets.STRIPE_PRO_ANNUAL_PRICE_ID }}
        VECTOR_DB_URL: ${{ secrets.VECTOR_DB_URL }}
        NEXT_PUBLIC_REVENUECAT_APPLE_KEY: ${{ secrets.NEXT_PUBLIC_REVENUECAT_APPLE_KEY }}
        INTERNAL_SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
        NEXT_PUBLIC_ELEVENLABS_API_KEY: ${{ secrets.NEXT_PUBLIC_ELEVENLABS_API_KEY }}
        NEXT_PUBLIC_ELEVENLABS_VOICE_ID: ${{ secrets.NEXT_PUBLIC_ELEVENLABS_VOICE_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      with:
        host: 204.168.176.229
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GROQ_API_KEY,DATABASE_URL,RAZORPAY_KEY_ID,NEXT_PUBLIC_RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET,RAZORPAY_WEBHOOK_SECRET,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRO_MONTHLY_PRICE_ID,STRIPE_PRO_ANNUAL_PRICE_ID,VECTOR_DB_URL,NEXT_PUBLIC_REVENUECAT_APPLE_KEY,INTERNAL_SERVICE_KEY,NEXT_PUBLIC_ELEVENLABS_API_KEY,NEXT_PUBLIC_ELEVENLABS_VOICE_ID,OPENAI_API_KEY
        command_timeout: 15m
        script: |
          set -e
          cd /root/purangpt-next
          git fetch origin main
          git clean -fd
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd

          # ── Render stack.env (build args) from GitHub Secrets ────────────
          umask 077
          cat <<EOF > /root/stack.env
          NEXT_PUBLIC_REVENUECAT_APPLE_KEY=$NEXT_PUBLIC_REVENUECAT_APPLE_KEY
          NEXT_PUBLIC_RAZORPAY_KEY_ID=$NEXT_PUBLIC_RAZORPAY_KEY_ID
          NEXT_PUBLIC_ELEVENLABS_API_KEY=$NEXT_PUBLIC_ELEVENLABS_API_KEY
          NEXT_PUBLIC_ELEVENLABS_VOICE_ID=$NEXT_PUBLIC_ELEVENLABS_VOICE_ID
          NEXT_PUBLIC_SUPABASE_URL=
          NEXT_PUBLIC_SUPABASE_ANON_KEY=
          EOF

          # ── Render frontend-secrets.env (runtime) from GitHub Secrets ────
          # Preserve Logto secrets already on the server (written during Logto setup),
          # and append/update the payment + auth secrets we manage from GitHub.
          sed -i '/^GOOGLE_CLIENT_/d;/^GROQ_API_KEY=/d;/^DATABASE_URL=/d;/^RAZORPAY_/d;/^NEXT_PUBLIC_RAZORPAY_/d;/^NEXT_PUBLIC_ELEVENLABS_/d;/^OPENAI_API_KEY=/d;/^STRIPE_/d;/^INTERNAL_SERVICE_KEY=/d;/^VECTOR_DB_URL=/d' /root/frontend-secrets.env 2>/dev/null || true
          cat <<EOF >> /root/frontend-secrets.env
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
          GROQ_API_KEY=$GROQ_API_KEY
          DATABASE_URL=$DATABASE_URL
          RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID
          NEXT_PUBLIC_RAZORPAY_KEY_ID=$NEXT_PUBLIC_RAZORPAY_KEY_ID
          RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET
          RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET
          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
          STRIPE_PRO_MONTHLY_PRICE_ID=$STRIPE_PRO_MONTHLY_PRICE_ID
          STRIPE_PRO_ANNUAL_PRICE_ID=$STRIPE_PRO_ANNUAL_PRICE_ID
          VECTOR_DB_URL=$VECTOR_DB_URL
          INTERNAL_SERVICE_KEY=$INTERNAL_SERVICE_KEY
          NEXT_PUBLIC_ELEVENLABS_API_KEY=$NEXT_PUBLIC_ELEVENLABS_API_KEY
          NEXT_PUBLIC_ELEVENLABS_VOICE_ID=$NEXT_PUBLIC_ELEVENLABS_VOICE_ID
          OPENAI_API_KEY=$OPENAI_API_KEY
          EOF
          chmod 600 /root/stack.env /root/frontend-secrets.env
          echo "✓ Rendered /root/stack.env and /root/frontend-secrets.env"

          cd /root
          docker compose --env-file /root/stack.env build --no-cache frontend
          # --no-deps: don't recreate the backend when starting the frontend.
          # The backend has its own deploy workflow; touching it here can cause
          # OOM kills during simultaneous startup (137 exit code).
          docker compose --env-file /root/stack.env up -d --no-deps frontend
          docker image prune -f
          # If the frontend container is in Created state (depends_on not met),
          # start it directly — the backend is already running externally.
          sleep 3
          docker start purangpt_frontend 2>/dev/null || true

          # ── Warm the Next.js server ──────────────────────────────────────
          # The first request after deploy triggers page compilation; pre-warm
          # the key routes so the first real visitor doesn't pay the 5-9s cold
          # start penalty (standalone mode JIT-compiles each route on first hit).
          echo "Warming Next.js routes..."
          for i in 1 2 3; do
            curl -s -o /dev/null http://localhost:3000/chat && echo "  warm $i OK" && break || sleep 2
          done
          curl -s -o /dev/null http://localhost:3000/ || true
          echo "✓ Routes warm"
