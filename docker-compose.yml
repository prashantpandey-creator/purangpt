# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEV ONLY — do NOT run this on the production server.
#
# Production runs from the ROOT compose at /root/docker-compose.yml (backend +
# frontend + logto + logto-db/pgvector), NOT from this file. This file used to
# also define a `pgvector` service with POSTGRES_PASSWORD=postgres; running it on
# the prod box recreated the shared DB with the wrong password and broke the live
# backend's scram auth (the a8ab20… password it actually uses). It has been
# stripped to backend-only to remove that landmine.
#
# For local dev, point VECTOR_DB_URL at your own Postgres+pgvector instance.
# ─────────────────────────────────────────────────────────────────────────────
services:
  purangpt:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - VECTOR_DB_URL=${VECTOR_DB_URL:-postgresql://postgres:postgres@host.docker.internal:5432/purangpt}
      - REDIS_URL=redis://redis:6379/0
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
