services:
  purangpt:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - LLM_PROVIDER=ollama
      - NEXT_PUBLIC_API_URL=
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - DB_DIR=/app/data/chroma_db
      - CHUNKS_DIR=/app/data/chunks
      - INDEX_DIR=/app/data/indexes
      - HOST=0.0.0.0
      - PORT=8000
      - VECTOR_DB_URL=postgresql://postgres:postgres@pgvector:5432/purangpt
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      ollama:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    restart: unless-stopped

  pgvector:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=purangpt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Pull the LLM model on first startup
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull qwen2.5:7b && echo 'Model ready'"
    restart: "no"

volumes:
  ollama_models:
  pgdata:
