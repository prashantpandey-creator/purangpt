<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE AWAKENER — Ayodhya</title>
<style>
  :root { --gold:#f2c879; --saffron:#ff9933; --ink:#1a1208; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#0c0a12; font-family:'Marcellus',Georgia,serif; color:#f4e9d0; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  .hud { position:fixed; pointer-events:none; z-index:10; }
  #title { top:18px; left:24px; font-size:15px; letter-spacing:3px; color:var(--gold); text-shadow:0 1px 6px #000; opacity:.85; }
  #title small { display:block; font-size:10px; letter-spacing:2px; color:#c9a86a; margin-top:2px; }
  #hint { bottom:18px; left:24px; font-size:12px; color:#cbb98c; text-shadow:0 1px 4px #000; line-height:1.7; }
  #hint b { color:var(--gold); }
  #conn { top:18px; right:24px; font-size:11px; letter-spacing:1px; }
  #conn .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; }

  /* the saga panel — slides in when you approach a being */
  #panel {
    position:fixed; top:0; right:0; height:100%; width:340px; z-index:20;
    background:linear-gradient(180deg, rgba(20,14,8,.96), rgba(12,9,14,.97));
    border-left:1px solid rgba(242,200,121,.25);
    transform:translateX(100%); transition:transform .35s cubic-bezier(.2,.8,.2,1);
    padding:28px 24px; overflow-y:auto; pointer-events:auto;
  }
  #panel.open { transform:translateX(0); }
  #panel h2 { font-size:22px; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
  #panel .kind { font-size:11px; letter-spacing:2px; color:#a98c5a; text-transform:uppercase; margin-bottom:18px; }
  #panel .headline { font-size:13px; line-height:1.6; color:#e8d8b4; font-style:italic; padding:12px 0; border-top:1px solid rgba(242,200,121,.15); border-bottom:1px solid rgba(242,200,121,.15); margin-bottom:18px; }
  #panel .strand { margin-bottom:16px; }
  #panel .strand h3 { font-size:10px; letter-spacing:2px; color:var(--saffron); text-transform:uppercase; margin-bottom:7px; opacity:.9; }
  #panel .edge { font-size:12.5px; line-height:1.6; color:#d8c8a4; padding:2px 0; }
  #panel .edge em { color:#9a8050; font-style:normal; font-size:11px; }
  #panel .rel { color:#9a8050; font-size:11px; }
  #panel .close { position:absolute; top:16px; right:18px; font-size:20px; color:#8a7450; cursor:pointer; pointer-events:auto; }
  #panel .fight { margin-top:22px; padding-top:18px; border-top:1px solid rgba(242,200,121,.15); }
  #panel button {
    pointer-events:auto; cursor:pointer; font-family:inherit; font-size:12px; letter-spacing:1px;
    background:rgba(242,200,121,.12); color:var(--gold); border:1px solid rgba(242,200,121,.4);
    padding:9px 14px; border-radius:6px; margin:4px 4px 0 0;
  }
  #panel button:hover { background:rgba(242,200,121,.22); }
  #fightlog { margin-top:14px; font-size:12px; line-height:1.7; color:#d8c8a4; }
  #fightlog .canon { color:#9ad29a; } #fightlog .draft { color:var(--saffron); }
  #fightlog .warn { color:#a08868; font-size:11px; display:block; }

  #loading { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; background:#0c0a12; color:var(--gold); font-size:14px; letter-spacing:2px; }
  #loading.gone { opacity:0; pointer-events:none; transition:opacity .6s; }
</style>
</head>
<body>
<div id="app"></div>

<div id="loading">raising Ayodhya from the texts…</div>

<div id="title" class="hud">THE AWAKENER<small>AYODHYA · THE LIGHT BEYOND LIGHT</small></div>
<div id="conn" class="hud"><span class="dot" style="background:#c98"></span><span id="connlabel">seeking the brain…</span></div>
<div id="hint" class="hud"><b>W A S D</b> walk &nbsp;·&nbsp; <b>mouse</b> look &nbsp;·&nbsp; approach a <b>luminous figure</b> to behold their saga</div>

<div id="panel">
  <span class="close" onclick="closePanel()">×</span>
  <h2 id="p-name"></h2>
  <div class="kind" id="p-kind"></div>
  <div class="headline" id="p-headline"></div>
  <div id="p-strands"></div>
  <div class="fight" id="p-fight" style="display:none">
    <h3 style="font-size:10px;letter-spacing:2px;color:var(--saffron);text-transform:uppercase;margin-bottom:8px">test the astras (true to the texts)</h3>
    <button onclick="fight('Brahmastra','counter_with:Brahmastra')">Brahmastra ↔ Brahmastra</button>
    <button onclick="fight('Narayanastra','surrender')">Narayanastra · surrender</button>
    <button onclick="fight('Narayanastra','resist')">Narayanastra · resist</button>
    <div id="fightlog"></div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module" src="./awakener.js"></script>
</body>
</html>
