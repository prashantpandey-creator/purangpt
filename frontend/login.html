<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - PuranGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        let currentAuthType = '';
        let currentAuthTarget = '';
        
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-google').style.display = 'none';
            document.getElementById('tab-email').style.display = 'none';
            document.getElementById('tab-phone').style.display = 'none';
            document.getElementById('tab-' + tab).style.display = 'block';
        }
        
        async function handleEmailAuth() {
            const email = document.getElementById('email-input').value;
            if(!email) return;
            const err = await signInWithEmail(email);
            if(err) alert(err);
            else {
                document.getElementById('email-msg').style.display = 'block';
                showOTPModal('email', email);
            }
        }
        
        async function handlePhoneAuth() {
            const phone = document.getElementById('phone-input').value;
            if(!phone) return;
            const err = await signInWithPhone(phone);
            if(err) alert(err);
            else showOTPModal('phone', phone);
        }
        
        function showOTPModal(type, target) {
            currentAuthType = type;
            currentAuthTarget = target;
            document.getElementById('otp-target').innerText = target;
            document.getElementById('otp-modal').style.display = 'flex';
        }
        
        async function submitOTP() {
            const token = document.getElementById('otp-input').value;
            if(token.length !== 6) return;
            const err = await verifyOTP(currentAuthTarget, token, currentAuthType);
            if(err) alert(err);
            else {
                document.getElementById('otp-modal').style.display = 'none';
                // Auth state change will handle redirect
            }
        }
</script>

    <style>
        body {
            background-color: var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* Mandala background effect */
        .bg-mandala {
            position: absolute;
            width: 150vw;
            height: 150vw;
            max-width: 1000px;
            max-height: 1000px;
            background: radial-gradient(circle, rgba(212, 168, 67, 0.05) 0%, rgba(11, 9, 7, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse 10s infinite alternate ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .login-card {
            background: rgba(20, 17, 13, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--t1);
            margin-bottom: 8px;
        }
        
        .logo span {
            color: var(--saffron);
        }
        
        .tagline {
            color: var(--t3);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .btn-google {
            background: var(--b1);
            color: var(--t1);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 14px 24px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        
        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--t3);
        }
        
        .divider {
            display: flex;
            align-items: center;
            color: var(--t3);
            font-size: 12px;
            margin: 24px 0;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-light);
        }
        
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }

        .btn-guest {
            background: transparent;
            color: var(--t2);
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        .btn-guest:hover {
            color: var(--t1);
        }
        
        .guest-note {
            color: var(--t3);
            font-size: 12px;
            margin-top: 8px;
        }
    
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--t2); font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-light); color: var(--t1); border-radius: 8px; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--saffron); }
        .btn-submit { background: var(--saffron); color: #000; border: none; border-radius: 12px; padding: 14px 24px; width: 100%; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
        .btn-submit:hover { background: #e6b84d; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 12px; }
        .auth-tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; color: var(--t2); cursor: pointer; text-align: center; border: none; background: transparent; transition: all 0.2s; }
        .auth-tab.active { background: rgba(255,255,255,0.1); color: var(--t1); font-weight: 500; }
        
        .otp-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
        .otp-content { background: var(--b0); padding: 32px; border-radius: 16px; border: 1px solid var(--border-light); width: 100%; max-width: 320px; text-align: center; }
</style>
</head>
<body>
    <div class="bg-mandala"></div>
    
    <div class="login-card">
        <div class="logo">ॐ Puran<span>GPT</span></div>
        <div class="tagline">Illuminating Vedic Wisdom through AI</div>
        
        
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('google')">Google</button>
            <button class="auth-tab" onclick="switchTab('email')">Email</button>
            <button class="auth-tab" onclick="switchTab('phone')">Phone</button>
        </div>
        
        <div id="tab-google">
            <button class="btn-google" onclick="signInWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
        </div>
        
        <div id="tab-email" style="display: none;">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email-input" placeholder="you@example.com">
            </div>
            <button class="btn-submit" onclick="handleEmailAuth()">Send Magic Link / OTP</button>
            <div id="email-msg" style="font-size: 12px; color: #4ade80; display: none;">Link & OTP sent! Check your inbox.</div>
        </div>
        
        <div id="tab-phone" style="display: none;">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone-input" placeholder="+1234567890">
            </div>
            <button class="btn-submit" onclick="handlePhoneAuth()">Send SMS OTP</button>
        </div>

        
        <div class="divider">OR</div>
        
        <button class="btn-guest" onclick="localStorage.setItem('purangpt_guest', 'true'); window.location.href='/'">Continue as Guest</button>
        <div class="guest-note">10 free messages per day. No history saved.</div>
    </div>
    
    <script>
        onAuthStateChange((user) => {
            if (user) {
                window.location.href = '/';
            }
        });
    
        let currentAuthType = '';
        let currentAuthTarget = '';
        
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-google').style.display = 'none';
            document.getElementById('tab-email').style.display = 'none';
            document.getElementById('tab-phone').style.display = 'none';
            document.getElementById('tab-' + tab).style.display = 'block';
        }
        
        async function handleEmailAuth() {
            const email = document.getElementById('email-input').value;
            if(!email) return;
            const err = await signInWithEmail(email);
            if(err) alert(err);
            else {
                document.getElementById('email-msg').style.display = 'block';
                showOTPModal('email', email);
            }
        }
        
        async function handlePhoneAuth() {
            const phone = document.getElementById('phone-input').value;
            if(!phone) return;
            const err = await signInWithPhone(phone);
            if(err) alert(err);
            else showOTPModal('phone', phone);
        }
        
        function showOTPModal(type, target) {
            currentAuthType = type;
            currentAuthTarget = target;
            document.getElementById('otp-target').innerText = target;
            document.getElementById('otp-modal').style.display = 'flex';
        }
        
        async function submitOTP() {
            const token = document.getElementById('otp-input').value;
            if(token.length !== 6) return;
            const err = await verifyOTP(currentAuthTarget, token, currentAuthType);
            if(err) alert(err);
            else {
                document.getElementById('otp-modal').style.display = 'none';
                // Auth state change will handle redirect
            }
        }
</script>

    <div id="otp-modal" class="otp-modal">
        <div class="otp-content">
            <h3 style="margin-top:0;">Enter OTP</h3>
            <p style="font-size: 14px; color: var(--t2); margin-bottom: 20px;">We sent a 6-digit code to your <span id="otp-target"></span>.</p>
            <div class="form-group">
                <input type="text" id="otp-input" placeholder="123456" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 8px;">
            </div>
            <button class="btn-submit" onclick="submitOTP()">Verify</button>
            <button class="btn-guest" onclick="document.getElementById('otp-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</body>
</html>
