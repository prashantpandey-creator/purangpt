<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Settings - PuranGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="auth.js"></script>
    <style>
        body { background-color: var(--bg-base); color: var(--t1); margin: 0; padding: 40px 20px; font-family: 'Inter', sans-serif; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: rgba(20, 17, 13, 0.85); border: 1px solid var(--border-light); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 600; margin: 0 0 20px 0; display: flex; align-items: center; gap: 12px; color: var(--t1); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--t2); font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; background: var(--b0); border: 1px solid var(--border-light); color: var(--t1); border-radius: 8px; font-family: monospace; }
        .form-group input:focus { outline: none; border-color: var(--saffron); }
        .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border-light); background: transparent; color: var(--t1); display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background: var(--b1); }
        .btn-primary { background: var(--saffron); color: #000; border: none; }
        .btn-primary:hover { background: #e6b84d; }
        .nav-back { margin-bottom: 30px; display: inline-flex; align-items: center; gap: 8px; color: var(--t2); text-decoration: none; }
        .nav-back:hover { color: var(--t1); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/profile.html" class="nav-back"><i data-lucide="arrow-left"></i> Back to Profile</a>
        <h1 style="font-family: 'Outfit', sans-serif; margin-bottom: 30px;">Account Settings</h1>
        
        <div class="card">
            <h2 class="card-title"><i data-lucide="key"></i> BYOK (Bring Your Own Key)</h2>
            <p style="color: var(--t2); font-size: 14px; margin-bottom: 20px;">Provide your own API keys to bypass usage limits. Keys are securely encrypted.</p>
            
            <div class="form-group">
                <label>Groq API Key</label>
                <input type="password" id="key-groq" placeholder="gsk_...">
            </div>
            <div class="form-group">
                <label>DeepSeek API Key</label>
                <input type="password" id="key-deepseek" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Together AI API Key</label>
                <input type="password" id="key-together" placeholder="...">
            </div>
            <div class="form-group">
                <label>Gemini API Key</label>
                <input type="password" id="key-gemini" placeholder="AIza...">
            </div>
            <div class="form-group">
                <label>Zhipu API Key</label>
                <input type="password" id="key-zhipu" placeholder="sk-...">
            </div>
            
            <button class="btn btn-primary" onclick="saveKeys()">Save Keys</button>
            <span id="save-status" style="margin-left: 12px; color: #4ade80; display: none;">Saved!</span>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
        
        onAuthStateChange(async (user, profile) => {
            if (!user) window.location.href = '/login.html';
            else loadKeys();
        });
        
        async function loadKeys() {
            const headers = await getAuthHeaders();
            try {
                const res = await fetch('/api/user/keys', { headers });
                if (res.ok) {
                    const data = await res.json();
                    const keys = data.keys || {};
                    if(keys.groq) document.getElementById('key-groq').placeholder = keys.groq;
                    if(keys.deepseek) document.getElementById('key-deepseek').placeholder = keys.deepseek;
                    if(keys.together) document.getElementById('key-together').placeholder = keys.together;
                    if(keys.gemini) document.getElementById('key-gemini').placeholder = keys.gemini;
                    if(keys.zhipu) document.getElementById('key-zhipu').placeholder = keys.zhipu;
                }
            } catch (e) { console.error(e); }
        }
        
        async function saveKeys() {
            const keys = {
                groq: document.getElementById('key-groq').value || undefined,
                deepseek: document.getElementById('key-deepseek').value || undefined,
                together: document.getElementById('key-together').value || undefined,
                gemini: document.getElementById('key-gemini').value || undefined,
                zhipu: document.getElementById('key-zhipu').value || undefined
            };
            
            const headers = await getAuthHeaders();
            headers['Content-Type'] = 'application/json';
            
            try {
                const res = await fetch('/api/user/keys', {
                    method: 'PUT',
                    headers,
                    body: JSON.stringify({ keys })
                });
                
                if (res.ok) {
                    document.getElementById('save-status').style.display = 'inline';
                    setTimeout(() => document.getElementById('save-status').style.display = 'none', 3000);
                }
            } catch (e) {
                alert('Failed to save keys');
            }
        }
    </script>
</body>
</html>
