<body class="bg-background text-on-background font-body text-body antialiased selection:bg-primary-container/30 h-screen flex flex-col relative overflow-hidden">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dark/80 backdrop-blur-md border-b-[0.5px] border-outline-variant/30 flex items-center justify-between px-margin-standard h-14 w-full max-w-[680px] mx-auto safe-area-pt">
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-70 transition-opacity active:scale-95 transition-transform w-8 h-8 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline text-headline font-semibold text-on-surface dark:text-on-surface">PuranGPT</h1>
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-70 transition-opacity active:scale-95 transition-transform w-8 h-8 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="info">info</span>
</button>
</header>
<!-- Chat Canvas -->
<main class="flex-1 overflow-y-auto px-margin-standard pt-24 pb-28 flex flex-col gap-6 max-w-[680px] mx-auto w-full">
<!-- Welcome Message / Ungrounded Badges context -->
<div class="flex justify-center mb-4">
<span class="bg-surface-container-high text-on-surface-variant font-caption text-caption px-3 py-1 rounded-full">Today, 9:41 AM</span>
</div>
<!-- Messages will be injected here -->
<!-- Spacer for bottom input -->
<div class="h-4"></div>
</main>
<!-- Bottom Input Bar Area (Frosted) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/80 dark:bg-surface-dark/80 backdrop-blur-xl border-t-[0.5px] border-outline-variant/30 pb-safe pt-2 px-margin-standard z-40">
<div class="max-w-[680px] mx-auto">
<div class="flex items-end gap-2 bg-white dark:bg-bg-grouped-dark border border-outline-variant/50 rounded-[24px] pl-4 pr-1 py-1 shadow-sm focus-within:ring-2 ring-primary-container/50 transition-shadow">
<textarea class="flex-1 bg-transparent border-none focus:ring-0 resize-none font-body text-body py-2.5 max-h-[120px] outline-none placeholder:text-text-secondary text-on-surface" id="chat-input" oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; toggleSendButton();" placeholder="Ask about Vedic texts..." rows="1"></textarea>
<button class="w-10 h-10 rounded-full bg-primary-container text-white flex items-center justify-center flex-shrink-0 transition-transform active:scale-95 mb-1 opacity-50 cursor-not-allowed" disabled="" id="send-button">
<span class="material-symbols-outlined" data-icon="arrow_upward" data-weight="fill">arrow_upward</span>
</button>
</div>
<div class="text-center mt-2">
<p class="font-caption text-caption text-text-secondary">AI interpretations may vary. Consult original texts.</p>
</div>
</div>
</div>
<!-- Note: BottomNavBar is suppressed based on 'Linear/Transactional/Task-Focused' logic for a specific chat thread -->
<script>
        function toggleSendButton() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('send-button');
            if (input.value.trim().length > 0) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('hover:opacity-90');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:opacity-90');
                btn.disabled = true;
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
