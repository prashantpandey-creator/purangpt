<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samanvaya — Agent Coordination Field</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --dim: #6c6c7c;
    --accent: #d4af37;
    --brahma: #4a9eff;
    --vishnu: #ff9f43;
    --rudra: #2ed573;
    --manas: #7c5ce7;
    --buddhi: #ff6b9d;
    --mahat: #00d2d3;
    --purusa: #feca57;
    --brahman: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 {
    font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
    color: #fff;
  }
  header h1 span { color: var(--accent); }
  header .subtitle {
    font-size: 14px; color: var(--dim); margin-top: 4px;
  }

  /* ── Layout ── */
  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: calc(100vh - 100px);
  }
  .field { padding: 24px 32px; border-right: 1px solid var(--border); }
  .sidebar { padding: 24px; background: var(--surface); }

  /* ── Layer grid ── */
  .layers {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .layer-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    min-height: 120px;
  }
  .layer-col h3 {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .layer-col .layer-fn {
    font-size: 11px; color: var(--dim); margin-bottom: 12px;
  }
  .layer-col.manas { border-top: 3px solid var(--manas); }
  .layer-col.manas h3 { color: var(--manas); }
  .layer-col.buddhi { border-top: 3px solid var(--buddhi); }
  .layer-col.buddhi h3 { color: var(--buddhi); }
  .layer-col.mahat { border-top: 3px solid var(--mahat); }
  .layer-col.mahat h3 { color: var(--mahat); }
  .layer-col.purusa { border-top: 3px solid var(--purusa); }
  .layer-col.purusa h3 { color: var(--purusa); }
  .layer-col.brahman { border-top: 3px solid var(--brahman); }
  .layer-col.brahman h3 { color: var(--brahman); }

  .layer-col.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 12px; font-style: italic;
  }

  /* ── Agent card ── */
  .agent-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 13px;
    position: relative;
  }
  .agent-card .agent-name {
    font-weight: 600; color: #fff; margin-bottom: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .agent-card .agent-name .dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  }
  .dot.brahma { background: var(--brahma); }
  .dot.vishnu { background: var(--vishnu); }
  .dot.rudra { background: var(--rudra); }

  .agent-card .agent-since { font-size: 10px; color: var(--dim); }
  .agent-card .agent-files {
    font-size: 11px; color: var(--dim); margin-top: 6px;
    word-break: break-all;
  }
  .agent-card .agent-files span {
    display: inline-block; background: var(--surface); padding: 1px 6px;
    border-radius: 3px; margin: 2px 2px 0 0; font-size: 10px;
    border: 1px solid var(--border);
  }

  .granthi-badge {
    font-size: 10px; padding: 1px 8px; border-radius: 10px;
    font-weight: 600; text-transform: uppercase;
  }
  .granthi-badge.brahma { background: rgba(74,158,255,0.15); color: var(--brahma); }
  .granthi-badge.vishnu { background: rgba(255,159,67,0.15); color: var(--vishnu); }
  .granthi-badge.rudra { background: rgba(46,213,115,0.15); color: var(--rudra); }

  /* ── Sidebar ── */
  .sidebar h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--dim); margin-bottom: 12px;
  }
  .conflict-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 12px;
  }
  .conflict-item .file { color: #fff; font-weight: 600; font-family: monospace; }
  .conflict-item .info { color: var(--dim); margin-top: 4px; }
  .conflict-item.safe { border-left: 3px solid var(--rudra); }
  .conflict-item.warn { border-left: 3px solid var(--vishnu); }

  .lineage-item {
    font-size: 11px; padding: 6px 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  .lineage-item .file { font-family: monospace; color: var(--text); }
  .lineage-item .owner { color: var(--dim); }

  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;
  }
  .stat {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 700; color: #fff; }
  .stat .label { font-size: 10px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }

  .refresh-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 11px; color: var(--dim);
    border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .refresh-bar button {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 11px;
  }
  .refresh-bar button:hover { border-color: var(--accent); color: #fff; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>Samanvaya <span>समन्वय</span></h1>
  <div class="subtitle" id="principle"></div>
</header>

<main>
  <div class="field">
    <div class="refresh-bar">
      <span id="refresh-status">Loaded</span>
      <button onclick="loadManifest()">⟳ Refresh</button>
    </div>
    <div class="layers" id="layers"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="icon">⊙</div>
      <div>The field is clear. No active agents.</div>
      <div style="margin-top:8px;font-size:12px">Run <code>declare</code> to begin work.</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="stats" id="stats"></div>
    <h3>File Conflicts</h3>
    <div id="conflicts"></div>
    <h3 style="margin-top:24px">Lineage</h3>
    <div id="lineage"></div>
  </div>
</main>

<script>
const LAYER_COLORS = {
  manas: '#7c5ce7', buddhi: '#ff6b9d', mahat: '#00d2d3',
  purusa: '#feca57', brahman: '#ffffff'
};

const LAYER_FUNCTIONS = {
  manas:   { vedic: 'Manas (मनस्)', tech: 'Retrieval Layer / RAG Pipeline', fn: 'Surfaces facts. Owns search.py, hybrid_search.' },
  buddhi:  { vedic: 'Buddhi (बुद्धि)', tech: 'Synthesis Layer / Reasoning Engine', fn: 'Discriminates, resolves. Owns buddhi.py, prompts.' },
  mahat:   { vedic: 'Mahat (महत्)', tech: 'Knowledge Graph / Structural Intelligence', fn: 'Cross-domain relationships. Owns graph_memory.py, RAM keys.' },
  purusa:  { vedic: 'Puruṣa (पुरुष)', tech: 'Query Understanding / Intent Router', fn: 'The witnessing attention. Owns query_processor.py expansion.' },
  brahman: { vedic: 'Brahman (ब्रह्मन्)', tech: 'Corpus / Embedding Store / Training Data', fn: 'The ground. Owns data/chunks/, embeddings.' }
};
const GRANTHI_LABELS = {
  brahma: 'Declaration (Intent Registration)',
  vishnu: 'Publication (Branch Push)',
  rudra: 'Verification (Merge + Lineage)'
};

async function loadManifest() {
  try {
    const resp = await fetch('MANIFEST.json?t=' + Date.now());
    const data = await resp.json();
    render(data);
    document.getElementById('refresh-status').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('refresh-status').textContent = 'Could not load MANIFEST.json';
    console.error(e);
  }
}

function render(data) {
  document.getElementById('principle').textContent = data._principle || '';

  const layersEl = document.getElementById('layers');
  const emptyEl = document.getElementById('empty-state');
  const conflictsEl = document.getElementById('conflicts');
  const lineageEl = document.getElementById('lineage');
  const statsEl = document.getElementById('stats');

  const active = data.active || {};
  const completed = data.completed || [];
  const lineage = data.lineage || {};
  const layers = data._layers || {};

  // ── Stats ──
  const totalActive = Object.keys(active).length;
  const byGranthi = { brahma: 0, vishnu: 0, rudra: 0 };
  Object.values(active).forEach(a => { byGranthi[a.granthi] = (byGranthi[a.granthi]||0) + 1; });
  statsEl.innerHTML = `
    <div class="stat"><div class="num">${totalActive}</div><div class="label">Active</div></div>
    <div class="stat"><div class="num">${completed.length}</div><div class="label">Completed</div></div>
    <div class="stat"><div class="num" style="color:var(--brahma)">${byGranthi.brahma||0}</div><div class="label">Brahma (Declared)</div></div>
    <div class="stat"><div class="num" style="color:var(--vishnu)">${byGranthi.vishnu||0}</div><div class="label">Vishnu (Published)</div></div>
  `;

  // ── Layer columns ──
  const layerAgents = {};
  Object.keys(layers).forEach(l => { layerAgents[l] = []; });
  Object.entries(active).forEach(([id, entry]) => {
    const l = entry.layer || 'unknown';
    if (!layerAgents[l]) layerAgents[l] = [];
    layerAgents[l].push({ id, ...entry });
  });

  let hasAny = false;
  layersEl.innerHTML = '';
  Object.entries(layers).forEach(([lname, linfo]) => {
    const agents = layerAgents[lname] || [];
    if (agents.length > 0) hasAny = true;
    const col = document.createElement('div');
    col.className = `layer-col ${lname}`;
    if (agents.length === 0) col.classList.add('empty');

    const lf = LAYER_FUNCTIONS[lname] || { vedic: lname, tech: linfo?.function || '', fn: '' };
    col.innerHTML = `<h3>${lf.vedic}</h3><div class="layer-fn" style="color:var(--accent);font-size:10px">${lf.tech}</div><div class="layer-fn">${lf.fn}</div>`;

    if (agents.length === 0) {
      col.innerHTML += `<div style="padding:20px;text-align:center;color:var(--dim);font-size:11px">clear</div>`;
    } else {
      agents.forEach(a => {
        const files = (a.touches || []).map(f =>
          `<span title="${f}">${f.includes('/') ? f.split('/').pop() : f}</span>`
        ).join(' ');
        col.innerHTML += `
          <div class="agent-card">
            <div class="agent-name">
              <span class="dot ${a.granthi}"></span> ${a.id}
              <span class="granthi-badge ${a.granthi}" title="${GRANTHI_LABELS[a.granthi] || a.granthi}">${a.granthi}</span>
            </div>
            <div class="agent-since">since ${(a.since||'').replace('T',' ').replace('Z','')}</div>
            <div class="agent-files">${files || '<span style="color:var(--dim)">no files declared</span>'}</div>
          </div>`;
      });
    }
    layersEl.appendChild(col);
  });

  emptyEl.style.display = hasAny ? 'none' : 'block';

  // ── File conflicts ──
  const fileAgents = {}; // filename → [{id, layer, granthi}]
  Object.entries(active).forEach(([id, entry]) => {
    (entry.touches || []).forEach(t => {
      const fname = t.includes(':') ? t.split(':')[0] : t;
      if (!fileAgents[fname]) fileAgents[fname] = [];
      fileAgents[fname].push({ id, layer: entry.layer, granthi: entry.granthi });
    });
  });

  const multiFiles = Object.entries(fileAgents).filter(([_, agents]) => agents.length > 1);
  conflictsEl.innerHTML = '';
  if (multiFiles.length === 0) {
    conflictsEl.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:12px 0">No file has multiple active agents. The field is clean.</div>';
  } else {
    multiFiles.forEach(([fname, agents]) => {
      const layers = new Set(agents.map(a => a.layer));
      const isSafe = layers.size > 1; // different layers = safe
      const div = document.createElement('div');
      div.className = `conflict-item ${isSafe ? 'safe' : 'warn'}`;
      div.innerHTML = `
        <div class="file">${fname}</div>
        <div class="info">
          ${agents.map(a => {
            const lf = LAYER_FUNCTIONS[a.layer] || { tech: a.layer };
            return `<span style="color:${LAYER_COLORS[a.layer]||'#fff'}">${a.id}</span> <span style="font-size:10px;color:var(--dim)">[${lf.tech.split(' / ')[0]}]</span>`;
          }).join(' · ')}
        </div>
        <div class="info" style="margin-top:2px;color:${isSafe ? 'var(--rudra)' : 'var(--vishnu)'}">
          ${isSafe ? '✅ Different layers — safe' : '⚠️ Same layer — coordinate'}
        </div>`;
      conflictsEl.appendChild(div);
    });
  }

  // ── Lineage ──
  const linEntries = Object.entries(lineage).slice(-10);
  lineageEl.innerHTML = '';
  if (linEntries.length === 0) {
    lineageEl.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:12px 0">No lineage recorded yet.</div>';
  } else {
    linEntries.reverse().forEach(([fname, owner]) => {
      const div = document.createElement('div');
      div.className = 'lineage-item';
      const shortFile = fname.includes('/') ? '…/' + fname.split('/').slice(-2).join('/') : fname;
      div.innerHTML = `<span class="file">${shortFile}</span><span class="owner">${owner}</span>`;
      lineageEl.appendChild(div);
    });
  }
}

// Auto-refresh every 5 seconds
loadManifest();
setInterval(loadManifest, 5000);
</script>

</body>
</html>
