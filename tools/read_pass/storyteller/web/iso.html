<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Isolation — Before / After</title>
<style>
  :root { --bg:#0d0a1a; --surface:#18133a; --accent:#f59e0b; --accent2:#a855f7;
          --text:#f0e8d0; --muted:#6b5a8a; --border:#2d2060; --good:#34d399; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:Georgia,serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center;
         justify-content:center; gap:24px; padding:40px 20px; }
  h1 { color:var(--accent); letter-spacing:2px; font-size:22px; text-align:center; }
  .sub { color:var(--muted); font-size:13px; text-align:center; max-width:520px; line-height:1.6; }
  .cards { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px;
          padding:24px 28px; width:280px; text-align:center; }
  .card.clean { border-color:var(--good); box-shadow:0 0 30px rgba(52,211,153,.12); }
  .tag { font-size:12px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; }
  .card.clean .tag { color:var(--good); }
  .title { font-size:18px; margin:6px 0 18px; }
  button { background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none;
           border-radius:12px; color:#0d0a1a; font-weight:bold; font-size:15px;
           padding:12px 20px; cursor:pointer; width:100%; font-family:inherit; }
  button:hover { opacity:.9; }
  .meta { font-size:12px; color:var(--muted); margin-top:12px; }
</style>
</head>
<body>
  <h1>VOICE ISOLATION — BEFORE / AFTER</h1>
  <div class="sub">Same 15-second slice from a Kundalini clip. The separation pulls his clean vocal out and drops the background music — without touching his timbre.</div>
  <div class="cards">
    <div class="card">
      <div class="tag">Before</div>
      <div class="title">With music</div>
      <button onclick="play('demo_with_music.wav',this)">▶ Play</button>
      <div class="meta">raw recording · music + voice</div>
    </div>
    <div class="card clean">
      <div class="tag">After</div>
      <div class="title">Isolated vocal</div>
      <button onclick="play('demo_isolated.wav',this)">▶ Play</button>
      <div class="meta">Demucs vocal stem · music removed</div>
    </div>
  </div>
  <audio id="player"></audio>
<script>
  const player = document.getElementById('player');
  let cur=null;
  function play(file, btn){
    document.querySelectorAll('button').forEach(b=>{ if(b!==btn) b.textContent='▶ Play'; });
    if(cur===file && !player.paused){ player.pause(); btn.textContent='▶ Play'; return; }
    player.src='refs/'+file; player.play(); cur=file; btn.textContent='⏸ Playing';
    player.onended=()=>{ btn.textContent='▶ Play'; };
  }
</script>
</body>
</html>
